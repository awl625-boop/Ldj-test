name: LDJ coupon watcher

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ldj-watcher
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        run: python monitor.py
      - name: Persist state
        run: |
          git config user.name "ldj-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json changelog.md
          git diff --quiet --cached || (
            git commit -m "update state [skip ci]" &&
            for i in {1..5}; do
              if git pull --rebase --autostash && git push; then
                echo "Successfully pushed state"
                exit 0
              fi
              git rebase --abort 2>/dev/null || true
              echo "Push attempt $i failed, retrying in 2 seconds..."
              sleep 2
            done
            echo "Failed to push after 5 attempts"
            exit 1
          )

     
