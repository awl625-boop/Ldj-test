name: LDJ coupon watcher

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ldj-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run watcher
        run: python monitor.py

      - name: Persist state
        run: |
          git config user.name "ldj-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --quiet --cached || git commit -m "update state [skip ci]"
          git pull --rebase
          git push
